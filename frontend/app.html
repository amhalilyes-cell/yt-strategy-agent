<script>
  const form = document.querySelector("form"); // ou ton select exact
  const emailInput = document.querySelector('input[type="email"]');
  const statusEl = document.querySelector("#status"); // adapte si besoin

  async function onSubmit(e) {
    e.preventDefault();
    const email = (emailInput.value || "").trim().toLowerCase();
    if (!email) return;

    if (statusEl) statusEl.textContent = "Connexion en cours...";

    const r = await fetch("/api/auth/magic/request", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include", // ✅ obligatoire pour cookie
      body: JSON.stringify({ email }),
    });

    if (!r.ok) {
      const t = await r.text();
      if (statusEl) statusEl.textContent = "Erreur: " + t;
      return;
    }

    // ✅ on entre dans l'app direct
    window.location.href = "/app";
  }

  if (form) form.addEventListener("submit", onSubmit);
</script>
